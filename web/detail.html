<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLight - 个股详情</title>
<script>
(function(){
  var t = localStorage.getItem("sl_theme");
  if (!t) { t = window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light"; }
  document.documentElement.setAttribute("data-theme", t);
})();
function toggleTheme() {
  var html = document.documentElement;
  var cur = html.getAttribute("data-theme");
  var next = cur === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("sl_theme", next);
  document.getElementById("themeIcon").textContent = next === "dark" ? "\u2600\uFE0F" : "\uD83C\uDF19";
  if (window._slThemeChange) window._slThemeChange();
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-body: #f0f2f5;
  --bg-card: #fff;
  --text-primary: #333;
  --text-secondary: #666;
  --text-muted: #888;
  --border-color: #e0e0e0;
  --border-light: #f0f0f0;
  --header-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  --header-text: #fff;
  --header-sub: #8899aa;
  --header-time: #667788;
  --table-header-bg: #f8f9fb;
  --table-header-border: #e8e8e8;
  --table-header-hover: #eef1f5;
  --table-stripe: #fafbfc;
  --table-hover: #e6f7ff;
  --sorted-bg: #e6f7ff;
  --sorted-color: #1890ff;
  --skeleton-cell: #e8e8e8;
  --skeleton-header: #d9d9d9;
  --skeleton-detail-chart: #f5f5f5;
  --skeleton-detail-bg: #fff;
  --shadow: rgba(0,0,0,.06);
  --shadow-hover: rgba(0,0,0,.08);
  --shadow-deep: rgba(0,0,0,.2);
  --up-color: #ef5350;
  --down-color: #26a69a;
  --accent-color: #1890ff;
  --accent-hover: #40a9ff;
  --neutral-color: #999;
  --error-color: #e74c3c;
  --link-color: #1890ff;
  --btn-default-bg: #fff;
  --btn-default-color: #666;
  --btn-default-border: #e0e0e0;
  --btn-default-hover-border: #999;
  --btn-default-hover-color: #333;
  --page-btn-color: #555;
  --page-btn-disabled-color: #ccc;
  --page-btn-disabled-border: #eee;
  --filter-bar-bg: #fff;
  --filter-input-bg: #fff;
  --filter-input-border: #e0e0e0;
  --filter-input-focus-border: #1890ff;
  --filter-label-color: #666;
  --filter-sep-color: #999;
  --chart-tooltip-bg: rgba(0,0,0,.85);
  --chart-tooltip-text: #fff;
  --chart-axis-color: #999;
  --chart-ma5: #f39c12;
  --chart-ma10: #3498db;
  --chart-ma20: #2ecc71;
  --chart-crosshair: rgba(0,0,0,0.3);
  --chart-grid: rgba(0,0,0,0.1);
  --chart-candle-up: #ef5350;
  --chart-candle-down: #26a69a;
  --chart-no-data: #999;
  --chart-ma-label: #666;
  --detail-header-label: #888;
  --status-bar-color: #888;
  --status-bar-border: #f0f0f0;
  --scrollbar-thumb: #ccc;
  --scrollbar-track: #f0f0f0;
  --back-to-top-bg: #1890ff;
  --back-to-top-hover-bg: #40a9ff;
}
[data-theme="dark"] {
  --bg-body: #13131f;
  --bg-card: #1e1e32;
  --text-primary: #d0d0e0;
  --text-secondary: #9090a8;
  --text-muted: #686880;
  --border-color: #2e2e48;
  --border-light: #2e2e48;
  --header-bg: linear-gradient(135deg, #0a0a14 0%, #13131f 100%);
  --header-text: #d0d0e0;
  --header-sub: #7878a0;
  --header-time: #585870;
  --table-header-bg: #18182a;
  --table-header-border: #2e2e48;
  --table-header-hover: #222238;
  --table-stripe: #1a1a2e;
  --table-hover: #1e1e3e;
  --sorted-bg: #14142e;
  --sorted-color: #40a9ff;
  --skeleton-cell: #2e2e48;
  --skeleton-header: #252540;
  --skeleton-detail-chart: #1e1e32;
  --skeleton-detail-bg: #1e1e32;
  --shadow: rgba(0,0,0,.4);
  --shadow-hover: rgba(0,0,0,.5);
  --shadow-deep: rgba(0,0,0,.5);
  --up-color: #ef5350;
  --down-color: #26a69a;
  --accent-color: #40a9ff;
  --accent-hover: #69c0ff;
  --neutral-color: #686880;
  --error-color: #ef5350;
  --link-color: #40a9ff;
  --btn-default-bg: #1e1e32;
  --btn-default-color: #9090a8;
  --btn-default-border: #2e2e48;
  --btn-default-hover-border: #555;
  --btn-default-hover-color: #d0d0e0;
  --page-btn-color: #9090a8;
  --page-btn-disabled-color: #444;
  --page-btn-disabled-border: #2e2e48;
  --filter-bar-bg: #1e1e32;
  --filter-input-bg: #13131f;
  --filter-input-border: #2e2e48;
  --filter-input-focus-border: #40a9ff;
  --filter-label-color: #9090a8;
  --filter-sep-color: #686880;
  --chart-tooltip-bg: rgba(30,30,50,.95);
  --chart-tooltip-text: #d0d0e0;
  --chart-axis-color: #686880;
  --chart-ma5: #f39c12;
  --chart-ma10: #3498db;
  --chart-ma20: #2ecc71;
  --chart-crosshair: rgba(255,255,255,0.25);
  --chart-grid: rgba(255,255,255,0.08);
  --chart-candle-up: #ef5350;
  --chart-candle-down: #26a69a;
  --chart-no-data: #686880;
  --chart-ma-label: #9090a8;
  --detail-header-label: #7878a0;
  --status-bar-color: #686880;
  --status-bar-border: #2e2e48;
  --scrollbar-thumb: #444;
  --scrollbar-track: #1e1e32;
  --back-to-top-bg: #40a9ff;
  --back-to-top-hover-bg: #69c0ff;
}
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-body); color: var(--text-primary); font-size: 14px; }
a { color: var(--link-color); text-decoration: none; }
a:hover { text-decoration: underline; }
.transition { transition: all .2s ease; }
.theme-toggle { background: none; border: 1px solid var(--header-sub); color: var(--header-sub); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; line-height: 1; padding: 0; }
.theme-toggle:hover { border-color: var(--header-text); color: var(--header-text); }
.header { background: var(--header-bg); color: var(--header-text); padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
.header .sub { color: var(--header-sub); font-size: 12px; }
.header .update-time { font-size: 12px; color: var(--header-time); }
.header .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }
.error { text-align: center; padding: 60px 0; color: var(--error-color); font-size: 15px; }
.retry-btn { display: block; margin: 16px auto 0; padding: 8px 24px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .2s; }
.retry-btn:hover { background: var(--accent-hover); }
.detail-header { background: var(--bg-card); border-radius: 10px; padding: 18px 22px; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 14px; transition: box-shadow .2s; }
.detail-header:hover { box-shadow: 0 4px 16px var(--shadow-hover); }
.detail-header h2 { font-size: 20px; margin-bottom: 14px; }
.detail-header h2 small { color: var(--detail-header-label); font-size: 14px; font-weight: 400; }
.detail-header .info-cards { display: flex; flex-wrap: wrap; gap: 12px; }
.detail-header .info-card { flex: 1; min-width: 160px; background: var(--table-stripe); border-radius: 8px; padding: 10px 14px; }
.detail-header .info-card .card-title { font-size: 11px; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 8px; font-weight: 600; }
.detail-header .info-card .info-grid { display: flex; flex-wrap: wrap; gap: 6px 18px; }
.detail-header .info-item { font-size: 13px; }
.detail-header .info-item .label { color: var(--detail-header-label); }
.detail-header .info-item .value { font-weight: 600; margin-left: 4px; }
.chart-wrap { background: var(--bg-card); border-radius: 10px; box-shadow: 0 2px 8px var(--shadow); padding: 8px; position: relative; transition: box-shadow .2s; }
.chart-wrap:hover { box-shadow: 0 4px 16px var(--shadow-hover); }
.chart-wrap canvas { width: 100%; height: 500px; display: block; }
.chart-tooltip { position: absolute; display: none; background: var(--chart-tooltip-bg); color: var(--chart-tooltip-text); padding: 8px 12px; border-radius: 6px; font-size: 12px; pointer-events: none; z-index: 10; white-space: nowrap; line-height: 1.6; max-width: 300px; }
.chart-tooltip.show { display: block; }
.chart-no-data { text-align: center; padding: 80px 0; color: var(--neutral-color); font-size: 15px; }
.back-btn { display: inline-block; color: var(--link-color); font-size: 13px; }
.detail-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.detail-nav-btns { display: flex; gap: 12px; }
.nav-btn { color: var(--link-color); font-size: 13px; cursor: pointer; }
.nav-btn:hover { text-decoration: underline; }
.back-to-top { position: fixed; bottom: 40px; right: 24px; width: 40px; height: 40px; background: var(--back-to-top-bg); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; z-index: 100; box-shadow: 0 2px 8px var(--shadow-deep); transition: background .2s, transform .2s; }
.back-to-top:hover { background: var(--back-to-top-hover-bg); transform: translateY(-2px); }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
.loading { padding: 60px 0; }
@keyframes shimmer { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
.skeleton-detail { animation: shimmer 1.5s ease-in-out infinite; padding: 16px 20px; background: var(--skeleton-detail-bg); border-radius: 10px; box-shadow: 0 2px 8px var(--shadow); }
.skeleton-detail .sk-info { display: flex; flex-wrap: wrap; gap: 12px 24px; margin-top: 12px; }
.skeleton-detail .sk-info .sk-cell { height: 14px; background: var(--skeleton-cell); border-radius: 3px; width: 100px; }
.skeleton-detail .sk-chart { height: 400px; background: var(--skeleton-detail-chart); border-radius: 8px; margin-top: 16px; }
@media (max-width: 768px) {
  .header { padding: 10px 12px; }
  .header h1 { font-size: 16px; }
  .container { padding: 8px; }
  .chart-wrap canvas { height: 350px; }
  .detail-header .info-grid { gap: 8px 16px; }
  .detail-header .info-card { min-width: 100%; }
}
</style>
<script src="js/indicators.js?v=2" defer></script>
<script src="js/chart.js?v=2" defer></script>
<script src="js/detail.js?v=2" defer></script>
</head>
<body>
<div class="header">
  <h1>StockLight</h1>
  <span class="sub" id="stockName">加载中...</span>
  <span class="sub" id="stockCode" style="color:var(--header-sub);"></span>
  <div class="header-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式"><span id="themeIcon">&#x2600;&#xFE0F;</span></button>
  </div>
</div>
<div class="container">
  <div class="detail-nav">
    <a href="index.html" class="back-btn">&larr; 返回列表</a>
    <span class="detail-nav-btns" id="navBtns">
      <a id="prevStock" class="nav-btn" style="display:none;">&larr; 上一只</a>
      <a id="nextStock" class="nav-btn" style="display:none;">下一只 &rarr;</a>
    </span>
  </div>

  <div class="loading" id="loadingMsg">
    <div class="skeleton-detail" id="skeletonDetail">
      <div style="height:24px;width:200px;background:var(--skeleton-cell);border-radius:4px;"></div>
      <div class="sk-info">
        <div class="sk-cell"></div><div class="sk-cell"></div><div class="sk-cell"></div>
        <div class="sk-cell"></div><div class="sk-cell"></div><div class="sk-cell"></div>
        <div class="sk-cell"></div><div class="sk-cell"></div><div class="sk-cell"></div>
      </div>
      <div class="sk-chart"></div>
    </div>
  </div>
  <div class="error" id="errorMsg" style="display:none;">
    <span id="errorText"></span>
    <button class="retry-btn" onclick="retryLoad()">重试</button>
  </div>

  <div id="detailContent" style="display:none;">
    <div class="detail-header">
      <h2><span id="stockName2"></span> <small id="stockCode2"></small></h2>
      <div class="info-cards">
        <div class="info-card">
          <div class="card-title">价格</div>
          <div class="info-grid">
            <div class="info-item"><span class="label">日期</span><span id="infoDate" class="value">-</span></div>
            <div class="info-item"><span class="label">开盘</span><span id="infoOpen" class="value">-</span></div>
            <div class="info-item"><span class="label">最高</span><span id="infoHigh" class="value">-</span></div>
            <div class="info-item"><span class="label">最低</span><span id="infoLow" class="value">-</span></div>
            <div class="info-item"><span class="label">收盘</span><span id="infoClose" class="value">-</span></div>
            <div class="info-item"><span class="label">涨跌幅</span><span id="infoPctchg" class="value">-</span></div>
          </div>
        </div>
        <div class="info-card">
          <div class="card-title">均线</div>
          <div class="info-grid">
            <div class="info-item"><span class="label">MA5</span><span id="infoMa5" class="value">-</span></div>
            <div class="info-item"><span class="label">MA10</span><span id="infoMa10" class="value">-</span></div>
            <div class="info-item"><span class="label">MA20</span><span id="infoMa20" class="value">-</span></div>
          </div>
        </div>
        <div class="info-card">
          <div class="card-title">量价</div>
          <div class="info-grid">
            <div class="info-item"><span class="label">成交量</span><span id="infoVolume" class="value">-</span></div>
            <div class="info-item"><span class="label">振幅</span><span id="infoAmplitude" class="value">-</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="chart-wrap" id="chartWrap">
      <canvas id="klineCanvas" height="500"></canvas>
      <div class="chart-tooltip" id="chartTooltip"></div>
    </div>
  </div>
  <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">&#8593;</div>
</div>
</body>
</html>
