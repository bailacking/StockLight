<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockLight - A股行情</title>
<script>
(function(){
  var t = localStorage.getItem("sl_theme");
  if (!t) { t = window.matchMedia("(prefers-color-scheme:dark)").matches ? "dark" : "light"; }
  document.documentElement.setAttribute("data-theme", t);
})();
function toggleTheme() {
  var html = document.documentElement;
  var cur = html.getAttribute("data-theme");
  var next = cur === "dark" ? "light" : "dark";
  html.setAttribute("data-theme", next);
  localStorage.setItem("sl_theme", next);
  document.getElementById("themeIcon").textContent = next === "dark" ? "\u2600\uFE0F" : "\uD83C\uDF19";
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {

  --bg-card: #fff;

  --text-muted: #888;

  --table-header-bg: #f8f9fb;

  --page-btn-disabled-border: #eee;
  --filter-bar-bg: #fff;
  --filter-input-bg: #fff;
  --filter-input-border: #e0e0e0;
  --filter-input-focus-border: #1890ff;
  --filter-label-color: #666;
  --filter-sep-color: #999;
  --chart-tooltip-bg: rgba(0,0,0,.85);
  --chart-tooltip-text: #fff;
  --chart-axis-color: #999;
  --chart-ma5: #f39c12;
  --chart-ma10: #3498db;
  --chart-ma20: #2ecc71;
  --chart-crosshair: rgba(0,0,0,0.3);
  --chart-candle-up: #ef5350;
  --chart-candle-down: #26a69a;

  --chart-ma-label: #666;
  --detail-header-label: #888;
  --status-bar-color: #888;
  --status-bar-border: #f0f0f0;

}

  --bg-card: #1e1e32;
  --text-primary: #d0d0e0;
  --text-secondary: #9090a8;

  --border-light: #2e2e48;

  --table-header-hover: #222238;
  --table-stripe: #1a1a2e;
  --table-hover: #1e1e3e;
  --sorted-bg: #14142e;
  --sorted-color: #40a9ff;
  --skeleton-cell: #2e2e48;
  --skeleton-header: #252540;

  --shadow-deep: rgba(0,0,0,.5);
  --up-color: #ef5350;
  --down-color: #26a69a;
  --accent-color: #40a9ff;
  --accent-hover: #69c0ff;
  --neutral-color: #686880;
  --error-color: #ef5350;
  --link-color: #40a9ff;
  --btn-default-bg: #1e1e32;
  --btn-default-color: #9090a8;
  --btn-default-border: #2e2e48;
  --btn-default-hover-border: #555;
  --btn-default-hover-color: #d0d0e0;
  --page-btn-color: #9090a8;

  --page-btn-disabled-border: #2e2e48;

  --filter-input-bg: #13131f;

  --chart-axis-color: #686880;
  --chart-ma5: #f39c12;
  --chart-ma10: #3498db;
  --chart-ma20: #2ecc71;
  --chart-crosshair: rgba(255,255,255,0.25);
  --chart-candle-up: #ef5350;
  --chart-candle-down: #26a69a;
  --chart-no-data: #686880;
  --chart-ma-label: #9090a8;

body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg-body); color: var(--text-primary); font-size: 14px; }
a { color: var(--link-color); text-decoration: none; }
a:hover { text-decoration: underline; }
.transition { transition: all .2s ease; }
.theme-toggle { background: none; border: 1px solid var(--header-sub); color: var(--header-sub); width: 32px; height: 32px; border-radius: 6px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all .2s; line-height: 1; padding: 0; }
.theme-toggle:hover { border-color: var(--header-text); color: var(--header-text); }
.header { background: var(--header-bg); color: var(--header-text); padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
.header .sub { color: var(--header-sub); font-size: 12px; }
.header .update-time { font-size: 12px; color: var(--header-time); }
.header .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
.container { max-width: 1400px; margin: 0 auto; padding: 16px; }
.filter-bar { background: var(--filter-bar-bg); border-radius: 10px; padding: 14px 18px; box-shadow: 0 2px 8px var(--shadow); margin-bottom: 14px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.filter-bar .search-input { flex: 1; min-width: 180px; padding: 7px 12px; border: 1px solid var(--filter-input-border); border-radius: 6px; font-size: 13px; outline: none; transition: border-color .2s; background: var(--filter-input-bg); color: var(--text-primary); }
.filter-bar .search-input:focus { border-color: var(--filter-input-focus-border); }
.filter-group { display: flex; align-items: center; gap: 4px; }
.filter-group label { font-size: 12px; color: var(--filter-label-color); white-space: nowrap; }
.filter-group input { width: 62px; padding: 4px 6px; border: 1px solid var(--filter-input-border); border-radius: 4px; font-size: 12px; outline: none; transition: border-color .2s; background: var(--filter-input-bg); color: var(--text-primary); }
.filter-group input:focus { border-color: var(--filter-input-focus-border); }
.filter-group .sep { color: var(--filter-sep-color); font-size: 12px; }
.filter-toggle { background: var(--accent-color); color: #fff; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background .2s; }
.filter-toggle:hover { background: var(--accent-hover); }
.filter-reset { background: var(--btn-default-bg); color: var(--btn-default-color); border: 1px solid var(--btn-default-border); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: all .2s; }
.filter-reset:hover { border-color: var(--btn-default-hover-border); color: var(--btn-default-hover-color); }
.filter-more { display: none; width: 100%; flex-wrap: wrap; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border-light); margin-top: 6px; }
.filter-more.show { display: flex; }
.table-wrap { overflow-x: auto; background: var(--bg-card); border-radius: 10px; box-shadow: 0 2px 8px var(--shadow); transition: box-shadow .2s; }
.table-wrap:hover { box-shadow: 0 4px 16px var(--shadow-hover); }
table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 13px; }
thead th { background: var(--table-header-bg); padding: 10px 8px; text-align: right; border-bottom: 2px solid var(--table-header-border); cursor: pointer; user-select: none; white-space: nowrap; position: sticky; top: 0; z-index: 2; font-weight: 600; color: var(--text-secondary); }
thead th:first-child { text-align: center; }
thead th:hover { background: var(--table-header-hover); }
thead th.sorted { background: var(--sorted-bg); color: var(--sorted-color); }
thead th .sort-icon { display: inline-flex; flex-direction: column; margin-left: 4px; vertical-align: middle; line-height: 1; font-size: 10px; }
thead th .sort-icon .arrow { color: var(--neutral-color); }
thead th .sort-icon .arrow.active { color: var(--sorted-color); }
tbody td { padding: 8px 8px; text-align: right; border-bottom: 1px solid var(--border-light); white-space: nowrap; }
tbody td:first-child { text-align: center; font-family: monospace; }
tbody td.name-cell { text-align: left; }
tbody tr:nth-child(even) { background: var(--table-stripe); }
tbody tr:hover { background: var(--table-hover); }
tbody tr.up td.pctchg { color: var(--up-color); font-weight: 600; }
tbody tr.down td.pctchg { color: var(--down-color); font-weight: 600; }
.up-color { color: var(--up-color); }
.down-color { color: var(--down-color); }
.neutral { color: var(--neutral-color); }
.status-bar { padding: 14px 10px; font-size: 12px; color: var(--status-bar-color); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; border-top: 1px solid var(--status-bar-border); }
.status-left { white-space: nowrap; }
.status-right { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
.page-buttons { display: inline-flex; align-items: center; gap: 2px; margin-left: 4px; }
.page-buttons button { padding: 3px 10px; border: 1px solid var(--btn-default-border); background: var(--btn-default-bg); border-radius: 4px; cursor: pointer; font-size: 12px; color: var(--page-btn-color); min-width: 30px; text-align: center; transition: all .2s; }
.page-buttons button:hover:not(:disabled) { border-color: var(--accent-color); color: var(--accent-color); }
.page-buttons button:disabled { color: var(--page-btn-disabled-color); cursor: default; border-color: var(--page-btn-disabled-border); }
.page-numbers { display: inline-flex; align-items: center; gap: 2px; }
.page-numbers button { min-width: 30px; padding: 3px 8px; }
.page-numbers button.current { background: var(--accent-color); color: #fff; border-color: var(--accent-color); }
.loading { padding: 60px 0; }
.loading-text { text-align: center; color: var(--neutral-color); font-size: 15px; }
@keyframes shimmer { 0% { opacity: 0.4; } 50% { opacity: 1; } 100% { opacity: 0.4; } }
.skeleton-table { animation: shimmer 1.5s ease-in-out infinite; border-radius: 10px; overflow: hidden; }
.skeleton-table .sk-row { display: flex; padding: 10px 8px; border-bottom: 1px solid var(--border-light); }
.skeleton-table .sk-row:first-child { padding: 8px; background: var(--table-header-bg); border-bottom: 2px solid var(--table-header-border); }
.skeleton-table .sk-cell { height: 14px; background: var(--skeleton-cell); border-radius: 3px; margin: 0 3px; flex: 1; }
.skeleton-table .sk-row:first-child .sk-cell { background: var(--skeleton-header); }
.skeleton-table .sk-cell.sk-sm { flex: 0.6; }
.skeleton-table .sk-cell.sk-lg { flex: 1.4; }
.error { text-align: center; padding: 60px 0; color: var(--error-color); font-size: 15px; }
.retry-btn { display: block; margin: 16px auto 0; padding: 8px 24px; background: var(--accent-color); color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; transition: background .2s; }
.retry-btn:hover { background: var(--accent-hover); }
.back-to-top { position: fixed; bottom: 40px; right: 24px; width: 40px; height: 40px; background: var(--back-to-top-bg); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; z-index: 100; box-shadow: 0 2px 8px var(--shadow-deep); transition: background .2s, transform .2s; }
.back-to-top:hover { background: var(--back-to-top-hover-bg); transform: translateY(-2px); }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--scrollbar-track); }
::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
@media (max-width: 768px) {
  .header { padding: 10px 12px; }
  .header h1 { font-size: 16px; }
  .container { padding: 8px; }
  .filter-bar { padding: 10px; }
  .filter-bar .search-input { min-width: 120px; }
}
</style>
<script src="js/indicators.js?v=2" defer></script>
<script src="js/table.js?v=2" defer></script>
<script src="js/app.js?v=2" defer></script>
</head>
<body>
<div class="header">
  <h1>StockLight</h1>
  <span class="sub">A股行情分析</span>
  <span class="update-time" id="statusBar"></span>
  <div class="header-right">
    <button class="theme-toggle" onclick="toggleTheme()" title="切换深色/浅色模式"><span id="themeIcon">&#x2600;&#xFE0F;</span></button>
  </div>
</div>
<div class="container">
  <div class="filter-bar" id="filterBar">
    <input type="text" class="search-input" id="searchInput" placeholder="搜索代码或名称">
    <div class="filter-group">
      <label>涨跌幅</label>
      <input type="number" id="pctchgMin" placeholder="最小">
      <span class="sep">~</span>
      <input type="number" id="pctchgMax" placeholder="最大">
    </div>
    <button class="filter-toggle" onclick="toggleMoreFilters()">更多筛选</button>
    <button class="filter-reset" onclick="resetFilters()">重置</button>
    <div class="filter-more" id="filterMore">
      <div class="filter-group">
        <label>收盘价</label>
        <input type="number" id="closeMin" placeholder="最小">
        <span class="sep">~</span>
        <input type="number" id="closeMax" placeholder="最大">
      </div>
      <div class="filter-group">
        <label>成交量</label>
        <input type="number" id="volumeMin" placeholder="最小(万)">
        <span class="sep">~</span>
        <input type="number" id="volumeMax" placeholder="最大(万)">
      </div>
      <div class="filter-group">
        <label>量比</label>
        <input type="number" id="volumeRatioMin" placeholder="最小" step="0.1">
        <span class="sep">~</span>
        <input type="number" id="volumeRatioMax" placeholder="最大" step="0.1">
      </div>
      <div class="filter-group">
        <label>换手率</label>
        <input type="number" id="turnoverRateMin" placeholder="最小" step="0.1">
        <span class="sep">~</span>
        <input type="number" id="turnoverRateMax" placeholder="最大" step="0.1">
      </div>
      <div class="filter-group">
        <label>PE</label>
        <input type="number" id="peMin" placeholder="最小">
        <span class="sep">~</span>
        <input type="number" id="peMax" placeholder="最大">
      </div>
      <div class="filter-group">
        <label>PB</label>
        <input type="number" id="pbMin" placeholder="最小" step="0.1">
        <span class="sep">~</span>
        <input type="number" id="pbMax" placeholder="最大" step="0.1">
      </div>
      <div class="filter-group">
        <label>总市值(亿)</label>
        <input type="number" id="marketCapMin" placeholder="最小">
        <span class="sep">~</span>
        <input type="number" id="marketCapMax" placeholder="最大">
      </div>
      <div class="filter-group">
        <label>振幅(%)</label>
        <input type="number" id="amplitudeMin" placeholder="最小" step="0.1">
        <span class="sep">~</span>
        <input type="number" id="amplitudeMax" placeholder="最大" step="0.1">
      </div>
    </div>
  </div>

  <div class="loading" id="loadingMsg">
    <div class="skeleton-table" id="skeletonTable">
      <div class="sk-row"><div class="sk-cell sk-sm"></div><div class="sk-cell sk-lg"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div></div>
      <div class="sk-row"><div class="sk-cell sk-sm"></div><div class="sk-cell sk-lg"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div></div>
      <div class="sk-row"><div class="sk-cell sk-sm"></div><div class="sk-cell sk-lg"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div></div>
      <div class="sk-row"><div class="sk-cell sk-sm"></div><div class="sk-cell sk-lg"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div></div>
      <div class="sk-row"><div class="sk-cell sk-sm"></div><div class="sk-cell sk-lg"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div><div class="sk-cell sk-sm"></div></div>
    </div>
  </div>
  <div class="error" id="errorMsg" style="display:none;">
    <span id="errorText"></span>
    <button class="retry-btn" onclick="retryLoad()">重试</button>
  </div>
  <div class="table-wrap" id="tableWrap" style="display:none;">
    <table>
      <thead>
        <tr>
          <th onclick="setSort('code')">代码<span class="sort-icon" id="sort-code"></span></th>
          <th onclick="setSort('name')" style="text-align:left;">名称<span class="sort-icon" id="sort-name"></span></th>
          <th onclick="setSort('latest_date')">日期<span class="sort-icon" id="sort-latest_date"></span></th>
          <th onclick="setSort('open')">开盘<span class="sort-icon" id="sort-open"></span></th>
          <th onclick="setSort('high')">最高<span class="sort-icon" id="sort-high"></span></th>
          <th onclick="setSort('low')">最低<span class="sort-icon" id="sort-low"></span></th>
          <th onclick="setSort('close')">收盘<span class="sort-icon" id="sort-close"></span></th>
          <th onclick="setSort('pctchg')">涨跌幅<span class="sort-icon" id="sort-pctchg"></span></th>
          <th onclick="setSort('volume')">成交量<span class="sort-icon" id="sort-volume"></span></th>
          <th onclick="setSort('volume_ratio')">量比<span class="sort-icon" id="sort-volume_ratio"></span></th>
          <th onclick="setSort('amplitude')">振幅<span class="sort-icon" id="sort-amplitude"></span></th>
          <th onclick="setSort('turnover_rate')">换手率<span class="sort-icon" id="sort-turnover_rate"></span></th>
          <th onclick="setSort('realtime_amount')">成交额<span class="sort-icon" id="sort-realtime_amount"></span></th>
          <th onclick="setSort('market_cap')">总市值<span class="sort-icon" id="sort-market_cap"></span></th>
          <th onclick="setSort('float_market_cap')">流通市值<span class="sort-icon" id="sort-float_market_cap"></span></th>
          <th onclick="setSort('pe_ttm')">PE<span class="sort-icon" id="sort-pe_ttm"></span></th>
          <th onclick="setSort('pb')">PB<span class="sort-icon" id="sort-pb"></span></th>
        </tr>
      </thead>
      <tbody id="stockTbody"></tbody>
    </table>
    <div class="status-bar">
      <span class="status-left"><span id="resultCount">0</span></span>
      <span class="status-right">
        每页
        <select id="pageSizeSelect" onchange="changePageSize()">
          <option value="50">50</option>
          <option value="100" selected>100</option>
          <option value="200">200</option>
        </select>
        条
        <span class="page-buttons">
          <button onclick="goFirst()" id="firstBtn" title="首页">|◀</button>
          <button onclick="goPage(-1)" id="prevBtn" title="上一页">◀</button>
          <span id="pageNumbers"></span>
          <button onclick="goPage(1)" id="nextBtn" title="下一页">▶</button>
          <button onclick="goLast()" id="lastBtn" title="末页">▶|</button>
        </span>
      </span>
    </div>
  </div>
  <div class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">&#8593;</div>
</div>
</body>
</html>
